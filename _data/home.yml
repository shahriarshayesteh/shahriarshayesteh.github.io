overview:
  title: "Overview"
  intro: >
    I study privacy disclosures in two settings: the conventional web and emerging agentic systems. The site centers on the datasets, analyses, and evaluation work that connect those settings.
  cards:
    - label: "Who I am"
      title: "PhD student in Informatics"
      description: >
        At Pennsylvania State University, I work on privacy, web-scale text analysis, and responsible AI questions.
    - label: "What I study"
      title: "Privacy norms across two environments"
      description: >
        My work tracks privacy disclosures in websites and asks how those norms shift when AI agents act on a user's behalf.
    - label: "Where to start"
      title: "SoACer, PrivaSeer, and agentic disclosure"
      description: >
        These projects show the main arc of the site: sector discovery, privacy analysis, and agentic AI evaluation.
  stats:
    - value: "3M+"
      label: "privacy policies in PrivaSeer"
    - value: "195,495"
      label: "websites in the SoAC corpus"
    - value: "59,590"
      label: "sector-tagged privacy policies analyzed"

research_map:
  title: "Research Map"
  intro: >
    Three themes organize the current work.
  areas:
    - title: "Sectoral web classification"
      description: >
        I build datasets and models that recover service sector from website text, making sector context usable for downstream analysis.
    - title: "Privacy policy analysis at scale"
      description: >
        I study how disclosures vary across industries and over time, with attention to transparency, vagueness, and sector-specific norms.
    - title: "Agentic AI disclosure"
      description: >
        I examine what AI agents reveal during tool use and how model behavior and schema design shape oversharing risk.

selected_work:
  title: "Selected Work"
  intro: >
    A few projects that show the main arc of the research.
  items:
    - eyebrow: "Sectoral web classification"
      period: "2025"
      title: "SoACer and the SoAC Corpus"
      problem: "Sector context is hard to recover from noisy and heterogeneous website content."
      contribution: "SoACer and the SoAC Corpus provide a web-scale classification pipeline and dataset for sector-aware analysis."
      impact: "They make privacy and governance studies more useful by preserving service context instead of flattening the web."
      links:
        - label: "Paper"
          url: "https://dl.acm.org/doi/abs/10.1145/3704268.3742691"
        - label: "Code"
          url: "https://github.com/shahriarshayesteh/SoAC_DocEng2025"
        - label: "Dataset"
          url: "https://huggingface.co/datasets/Shahriar/SoAC_Corpus"
    - eyebrow: "Large-scale privacy disclosure measurement"
      period: "2025-ongoing"
      title: "PrivaSeer and sectoral privacy analysis"
      problem: "Privacy disclosures are difficult to compare across industries and time at scale."
      contribution: "My work uses PrivaSeer and sector-aware analyses to study convergence, divergence, and opacity in privacy policies."
      impact: "This creates empirical grounding for transparency, governance, and data-handling research."
      links:
        - label: "SOUPS paper"
          url: "https://shomir.net/pdf/publications/privaseer_soups_2025_paper.pdf"
        - label: "Project site"
          url: "https://privaseer.ist.psu.edu/"
    - eyebrow: "Agentic privacy disclosure"
      period: "2026"
      title: "Agentic privacy disclosure"
      problem: "AI agents may disclose user information too similarly across service contexts when they use tools."
      contribution: "My dissertation work treats runtime tool calls as a key disclosure moment and studies both model behavior and schema design."
      impact: "It extends privacy analysis from the conventional web to agentic systems."

